<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event Engine — API Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    body { margin: 0; }
    #swagger-ui .topbar { display: none; }
    .back-link {
      display: inline-block;
      padding: 8px 16px;
      background: #f3f4f6;
      color: #374151;
      text-decoration: none;
      font-family: sans-serif;
      font-size: 13px;
      border-bottom: 1px solid #d1d5db;
    }
    .back-link:hover { background: #e5e7eb; }
  </style>
</head>
<body>
  <a class="back-link" href="index.html">← Back to Event Engine</a>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    SwaggerUIBundle({
      url: 'openapi.json',
      dom_id: '#swagger-ui',
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
      layout: 'BaseLayout',
      deepLinking: true,
      displayRequestDuration: true,
      defaultModelsExpandDepth: 1,
      defaultModelExpandDepth: 2,
      tryItOutEnabled: true,
      requestInterceptor: (req) => {
        // Pre-fill server URL from current window location
        if (!req.url.startsWith('http')) return req;
        const base = window.location.origin + '/local/acap_event_engine';
        req.url = req.url.replace(/^https?:\/\/[^/]+\/local\/acap_event_engine/, base);
        return req;
      }
    });
  </script>
</body>
</html>
