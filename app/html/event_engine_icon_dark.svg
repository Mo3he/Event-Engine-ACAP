<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="ic"><rect x="0" y="0" width="300" height="300" rx="72"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="300" height="300" rx="72" fill="url(#bg)"/>

  <g clip-path="url(#ic)">
    <!-- TRIGGERS - left, blue -->
    <circle cx="52" cy="108" r="11" fill="#378ADD"/>
    <circle cx="52" cy="150" r="11" fill="#378ADD" opacity="0.6"/>
    <circle cx="52" cy="192" r="11" fill="#378ADD" opacity="0.3"/>
    <line x1="63" y1="108" x2="129" y2="108" stroke="#378ADD" stroke-width="1.4" opacity="0.4"/>
    <line x1="63" y1="150" x2="129" y2="150" stroke="#378ADD" stroke-width="1.4" opacity="0.28"/>
    <line x1="63" y1="192" x2="129" y2="192" stroke="#378ADD" stroke-width="1.4" opacity="0.15"/>

    <!-- CONDITIONS - center, amber -->
    <circle cx="140" cy="108" r="11" fill="#F5A623"/>
    <circle cx="140" cy="150" r="11" fill="#F5A623" opacity="0.6"/>
    <circle cx="140" cy="192" r="11" fill="#F5A623" opacity="0.3"/>
    <line x1="151" y1="108" x2="217" y2="108" stroke="#00D4A0" stroke-width="1.4" opacity="0.4"/>
    <line x1="151" y1="150" x2="217" y2="150" stroke="#00D4A0" stroke-width="1.4" opacity="0.28"/>
    <line x1="151" y1="192" x2="217" y2="192" stroke="#00D4A0" stroke-width="1.4" opacity="0.15"/>

    <!-- ACTIONS - right, teal -->
    <circle cx="228" cy="108" r="11" fill="#00D4A0"/>
    <circle cx="228" cy="150" r="11" fill="#00D4A0" opacity="0.6"/>
    <circle cx="228" cy="192" r="11" fill="#00D4A0" opacity="0.3"/>
  </g>
</svg>
